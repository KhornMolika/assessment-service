name: Deploy Frontend to Google Cloud Run

on:
  push:
    branches:
      - demo
  workflow_dispatch:

env:
  SERVICE_NAME: assessment-frontend
  REGION: asia-southeast1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          cat << 'EOF' > .env.production
          ${{ secrets.ENV }}
          EOF
          docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .

      - name: Clear OS Login SSH Keys to prevent 32 KiB limit
        run: |
          for FINGERPRINT in $(gcloud compute os-login ssh-keys list --format="value(key)"); do
            for i in {1..5}; do
              if gcloud compute os-login ssh-keys remove --key="$FINGERPRINT" --quiet; then
                break
              fi
              echo "Retry $i for $FINGERPRINT..."
              sleep $((RANDOM % 3 + 2))
            done
          done

      - name: Copy .env to Compute Engine
        run: |
          cat << 'EOF' > .env.production
          ${{ secrets.ENV }}
          EOF
          for i in {1..5}; do
            if gcloud compute scp .env.production assessment-service:~/assessment-frontend.env --zone=asia-southeast1-a; then
              echo "SCP succeeded"
              exit 0
            fi
            echo "SCP failed, retrying in 10 seconds..."
            sleep 10
          done
          echo "SCP failed after 5 retries"
          exit 1

      - name: Push Docker Image
        run: |
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Compute Engine
        run: |
          for i in {1..5}; do
            if gcloud compute ssh assessment-service --zone=asia-southeast1-a --command="
              sudo docker pull docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
              sudo docker stop ${{ env.SERVICE_NAME }} || true
              sudo docker rm ${{ env.SERVICE_NAME }} || true
              sudo docker run -d --name ${{ env.SERVICE_NAME }} \
                --restart unless-stopped \
                --network traefik-public \
                --env-file ~/assessment-frontend.env \
                --label 'traefik.enable=true' \
                --label 'traefik.http.routers.frontend.rule=Host(\`assessment-service.molika.app\`)' \
                --label 'traefik.http.routers.frontend.entrypoints=websecure' \
                --label 'traefik.http.routers.frontend.tls.certresolver=myresolver' \
                --label 'traefik.http.services.frontend.loadbalancer.server.port=3000' \
                docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
              sudo docker system prune -af
            "; then
              echo "SSH succeeded"
              exit 0
            fi
            echo "SSH failed, retrying in 10 seconds..."
            sleep 10
          done
          echo "SSH failed after 5 retries"
          exit 1
