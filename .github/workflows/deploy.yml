name: Deploy Frontend to Google Cloud Run

on:
  push:
    branches:
      - demo
  workflow_dispatch:

env:
  SERVICE_NAME: assessment-frontend
  REGION: asia-southeast1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          echo "API_URL=https://assessment-backend.molika.app/api/v1" > .env.production
          echo "API_CLIENT_ID=dummy_id" >> .env.production
          echo "API_CLIENT_SECRET=dummy_secret" >> .env.production
          echo "METABASE_SITE_URL=https://metabase.molika.app" >> .env.production
          echo "METABASE_SECRET_KEY=dummy_key" >> .env.production
          echo "METABASE_DASHBOARD_ID=2" >> .env.production
          docker build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Compute Engine
        run: |
          gcloud compute ssh assessment-service --zone=asia-southeast1-a --command="
            sudo docker pull docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            sudo docker stop ${{ env.SERVICE_NAME }} || true
            sudo docker rm ${{ env.SERVICE_NAME }} || true
            
            # Write secrets to an env file on the VM
            echo \"API_URL=https://assessment-backend.molika.app/api/v1\" > /opt/assessment-frontend.env
            echo \"API_CLIENT_ID=\${{ secrets.API_CLIENT_ID }}\" >> /opt/assessment-frontend.env
            echo \"API_CLIENT_SECRET=\${{ secrets.API_CLIENT_SECRET }}\" >> /opt/assessment-frontend.env
            echo \"METABASE_SITE_URL=https://metabase.molika.app\" >> /opt/assessment-frontend.env
            echo \"METABASE_SECRET_KEY=\${{ secrets.METABASE_SECRET_KEY }}\" >> /opt/assessment-frontend.env
            echo \"METABASE_DASHBOARD_ID=2\" >> /opt/assessment-frontend.env

            sudo docker run -d --name ${{ env.SERVICE_NAME }} \
              --restart unless-stopped \
              --network traefik-public \
              --env-file /opt/assessment-frontend.env \
              --label 'traefik.enable=true' \
              --label 'traefik.http.routers.frontend.rule=Host(\`assessment-service.molika.app\`)' \
              --label 'traefik.http.routers.frontend.entrypoints=websecure' \
              --label 'traefik.http.routers.frontend.tls.certresolver=myresolver' \
              --label 'traefik.http.services.frontend.loadbalancer.server.port=3000' \
              docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            sudo docker system prune -af
          "
